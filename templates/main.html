<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="og:title" content="Success Disease Predictor">
  <meta name="author" content="Karan, Surbhi, Navdeep">
  <meta name="og:image" content="{{ url_for('static', filename='img/logo1.png') }}">
  <meta name="Keywords" content="Flask, Machine Learning, Deep Learning, Artificial Intelligence, AI, ML,DL, Web Development">
  <meta name="description" content="A Machine Learning and Deep Learning based webapp for Multiple Disease Prediction.">
  <title>Success Disease Predictor</title>
  
  <!-- Favicon -->
  <link rel="icon" href="{{ url_for('static', filename='img/logo1.png') }}" type="image/icon type">
  
  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  
  <!-- AOS Animation -->
  <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
  
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  
  <!-- Custom CSS -->
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  
  <style>
    :root {
      --primary-color: #2c3e50;
      --secondary-color: #3498db;
      --accent-color: #e74c3c;
      --text-color: #2c3e50;
      --light-bg: #f8f9fa;
    }
    
    body {
      font-family: 'Poppins', sans-serif;
      color: var(--text-color);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    
    .navbar {
      background-color: var(--primary-color) !important;
      padding: 1rem 0;
    }
    
    .navbar-brand img {
      height: 40px;
    }
    
    .nav-link {
      color: white !important;
      font-weight: 500;
      padding: 0.5rem 1rem;
      transition: all 0.3s ease;
    }
    
    .nav-link:hover {
      color: var(--secondary-color) !important;
    }
    
    main {
      flex: 1;
      padding-top: 80px;
    }
    
    .disease-card {
      transition: transform 0.3s ease;
      border: none;
      border-radius: 15px;
      overflow: hidden;
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    }
    
    .disease-card:hover {
      transform: translateY(-10px);
    }
    
    .btn-custom {
      background: var(--secondary-color);
      color: white;
      border: none;
      padding: 12px 30px;
      border-radius: 30px;
      transition: all 0.3s ease;
    }
    
    .btn-custom:hover {
      background: var(--primary-color);
      transform: translateY(-3px);
      box-shadow: 0 5px 15px rgba(0,0,0,0.2);
    }
    
    footer {
      background-color: var(--primary-color);
      color: white;
      padding: 2rem 0;
      margin-top: auto;
    }
    
    .social-links a {
      color: white;
      margin: 0 10px;
      font-size: 1.2rem;
      transition: color 0.3s ease;
    }
    
    .social-links a:hover {
      color: var(--secondary-color);
    }
  </style>
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-dark fixed-top">
    <div class="container">
      <a class="navbar-brand" href="{{ url_for('home') }}">
        <img src="{{ url_for('static', filename='img/logo.png') }}" alt="Success Disease Predictor">
      </a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item">
            <a class="nav-link" href="{{ url_for('home') }}">Home</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="{{ url_for('diabetesPage') }}">Diabetes</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="{{ url_for('cancerPage') }}">Breast Cancer</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="{{ url_for('heartPage') }}">Heart</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="{{ url_for('kidneyPage') }}">Kidney</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="{{ url_for('liverPage') }}">Liver</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="{{ url_for('malariaPage') }}">Malaria</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="{{ url_for('pneumoniaPage') }}">Pneumonia</a>
          </li>
        </ul>
      </div>
    </div>
  </nav>

  <main>
    <div class="container-fluid py-4">
      {% block content %}
      {% endblock %}
    </div>
  </main>

  <footer>
    <div class="container">
      <div class="row">
        <div class="col-md-6">
          <p>&copy; 2024 Success Disease Predictor. All rights reserved.</p>
        </div>
        <div class="col-md-6 text-end">
          <div class="social-links">
            <a href="www.linkedin.com/in/yash-yawale-7b3b77241" target="_blank"><i class="fab fa-linkedin"></i></a>
            <a href="https://github.com/yashyawale/Medical_Prediction_with_basic_ML.git" target="_blank"><i class="fab fa-github"></i></a>
          </div>
          <p class="mt-2">Made by Yash Yawale MIT ADT University</p>
          <p>Under the supervision of Dr. Satyakam Rahul</p>
        </div>
      </div>
    </div>
  </footer>

  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
  <script>
    // Initialize AOS
    AOS.init({
      duration: 1000,
      once: true
    });
  </script>
</body>
</html>
