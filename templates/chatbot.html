{% extends "main.html" %}
{% block content %}
<div style="background: #f0f2f5; padding: 30px 0; min-height: calc(100vh - 200px);">
  <div class="container">
    <div class="chat-container" style="max-width: 850px; margin: 0 auto; background: white; border-radius: 20px; box-shadow: 0 5px 30px rgba(0,0,0,0.1); overflow: hidden;">
      <!-- Header -->
      <div style="background: linear-gradient(135deg, #1a237e, #3498db); color: white; padding: 20px 25px; display: flex; justify-content: space-between; align-items: center;">
        <div>
          <h5 style="margin: 0; font-weight: 700;"><i class="fas fa-robot me-2"></i>Healthcare Assistant</h5>
          <small style="opacity: 0.8;">Powered by AI • Ask me anything about health</small>
        </div>
        <a href="{{ url_for('home') }}" class="btn btn-sm btn-light" style="font-weight: 600; border-radius: 8px;">
          <i class="fas fa-home"></i> Home
        </a>
      </div>

      <!-- Messages -->
      <div id="chatMessages" style="height: 420px; overflow-y: auto; padding: 20px;">
        <div style="background: #f1f3f4; padding: 12px 16px; border-radius: 15px; max-width: 80%; margin-bottom: 12px; font-size: 14px;">
          👋 Hello! I'm your Healthcare Assistant. Ask me about symptoms, diseases, or health advice.
        </div>
      </div>

      <!-- Quick Suggestions -->
      <div style="padding: 10px 20px; border-top: 1px solid #eee; display: flex; flex-wrap: wrap; gap: 8px;">
        <button class="qbtn" onclick="suggestDisease('diabetes')">🩸 Diabetes</button>
        <button class="qbtn" onclick="suggestDisease('heart disease')">❤️ Heart</button>
        <button class="qbtn" onclick="suggestDisease('cancer')">🎗️ Cancer</button>
        <button class="qbtn" onclick="suggestDisease('kidney disease')">🫘 Kidney</button>
        <button class="qbtn" onclick="suggestDisease('liver disease')">🫁 Liver</button>
        <button class="qbtn" onclick="suggestDisease('malaria')">🦟 Malaria</button>
        <button class="qbtn" onclick="suggestDisease('pneumonia')">🫁 Pneumonia</button>
      </div>

      <!-- Input -->
      <div style="padding: 15px 20px; background: #f8f9fa;">
        <form id="chatForm" onsubmit="sendMessage(event)" style="display: flex; gap: 10px;">
          <input type="text" id="userInput" class="form-control" placeholder="Type your health question..." style="border-radius: 25px; padding: 12px 20px; border: 2px solid #e0e0e0;">
          <button type="submit" style="background: #1a237e; color: white; border: none; border-radius: 50%; width: 48px; height: 48px; flex-shrink: 0; cursor: pointer;">
            <i class="fas fa-paper-plane"></i>
          </button>
        </form>
      </div>
    </div>
  </div>
</div>

<style>
.qbtn{background:#e8eaf6;color:#1a237e;border:none;padding:6px 14px;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;transition:all 0.2s;}
.qbtn:hover{background:#1a237e;color:white;}
</style>

<script>
function sendMessage(event){
  event.preventDefault();
  const input=document.getElementById('userInput');
  const msg=input.value.trim();
  if(!msg)return;
  addMessage(msg,'user');
  input.value='';
  // Show typing indicator
  const typing=document.createElement('div');
  typing.id='typing';
  typing.style.cssText='background:#f1f3f4;padding:12px 16px;border-radius:15px;max-width:80%;margin-bottom:12px;font-size:14px;color:#666;';
  typing.textContent='Thinking...';
  document.getElementById('chatMessages').appendChild(typing);

  fetch('/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({message:msg})})
  .then(r=>r.json())
  .then(data=>{
    document.getElementById('typing')?.remove();
    addMessage(data.reply,'bot');
    fetch('/api/log/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({user_message:msg,bot_response:data.reply})}).catch(()=>{});
  })
  .catch(()=>{document.getElementById('typing')?.remove();addMessage('Sorry, an error occurred. Please try again.','bot');});
}
function suggestDisease(d){document.getElementById('userInput').value='Tell me about '+d+' symptoms and prevention';sendMessage(new Event('submit'));}
function addMessage(text,sender){
  const box=document.getElementById('chatMessages');
  const div=document.createElement('div');
  div.style.cssText=sender==='user'?'background:#1a237e;color:white;padding:12px 16px;border-radius:15px;max-width:80%;margin-bottom:12px;margin-left:auto;font-size:14px;':'background:#f1f3f4;padding:12px 16px;border-radius:15px;max-width:80%;margin-bottom:12px;font-size:14px;line-height:1.6;';
  if(sender==='user'){div.textContent=text;}else{div.innerHTML=text;}
  box.appendChild(div);
  box.scrollTop=box.scrollHeight;
}
</script>
{% endblock %}
