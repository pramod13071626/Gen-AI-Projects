{% extends "main.html" %}
{% block content %}
<div class="container">
    <div class="row">
        <div class="col-lg-8 mx-auto text-center" data-aos="fade-up">
            <h1 class="display-4 mb-4">Liver Disease Prediction</h1>
            <p class="lead mb-5">Enter your health details below to get a prediction about your liver disease risk.</p>
        </div>
    </div>
    
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <div class="card disease-card" data-aos="fade-up" data-aos-delay="100">
                <div class="card-body p-4">
                    <form action="{{ url_for('predictPage') }}" method="POST">
                        <div class="row g-3">
                            <div class="col-md-6">
                                <div class="form-group">
                                    <label for="age">Age (years)</label>
                                    <input type="number" class="form-control" id="age" name="age" required>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="form-group">
                                    <label for="gender">Gender</label>
                                    <select class="form-control" id="gender" name="gender" required>
                                        <option value="">Select Gender</option>
                                        <option value="1">Male</option>
                                        <option value="0">Female</option>
                                    </select>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="form-group">
                                    <label for="total_bilirubin">Total Bilirubin (mg/dL)</label>
                                    <input type="number" step="0.1" class="form-control" id="total_bilirubin" name="total_bilirubin" required>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="form-group">
                                    <label for="direct_bilirubin">Direct Bilirubin (mg/dL)</label>
                                    <input type="number" step="0.1" class="form-control" id="direct_bilirubin" name="direct_bilirubin" required>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="form-group">
                                    <label for="alkaline_phosphotase">Alkaline Phosphotase (IU/L)</label>
                                    <input type="number" class="form-control" id="alkaline_phosphotase" name="alkaline_phosphotase" required>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="form-group">
                                    <label for="alamine_aminotransferase">Alamine Aminotransferase (IU/L)</label>
                                    <input type="number" class="form-control" id="alamine_aminotransferase" name="alamine_aminotransferase" required>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="form-group">
                                    <label for="aspartate_aminotransferase">Aspartate Aminotransferase (IU/L)</label>
                                    <input type="number" class="form-control" id="aspartate_aminotransferase" name="aspartate_aminotransferase" required>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="form-group">
                                    <label for="total_proteins">Total Proteins (g/dL)</label>
                                    <input type="number" step="0.1" class="form-control" id="total_proteins" name="total_proteins" required>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="form-group">
                                    <label for="albumin">Albumin (g/dL)</label>
                                    <input type="number" step="0.1" class="form-control" id="albumin" name="albumin" required>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="form-group">
                                    <label for="albumin_and_globulin_ratio">Albumin and Globulin Ratio</label>
                                    <input type="number" step="0.1" class="form-control" id="albumin_and_globulin_ratio" name="albumin_and_globulin_ratio" required>
                                </div>
                            </div>
                        </div>
                        <div class="text-center mt-4">
                            <button type="submit" class="btn btn-custom">Predict</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
