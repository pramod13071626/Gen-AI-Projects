<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.4.1/css/bootstrap.min.css"
    integrity="sha384-Vkoo8x4CGsO3+Hhxv8T/Q5PaXtkKtu6ug5TOeNV6gBiFeWPGFN9MuhOf23Q9Ifjh" crossorigin="anonymous">
  <meta http-equiv="X-UA-Compatible" content="ie=edge" />
  <title>Chatbot Demo</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Arial, Helvetica, sans-serif;
      background-color: #f2f2f2;
    }

    .chat-container {
      width: 1000px;
      margin: 50px auto;
      border: 1px solid #ddd;
      border-radius: 5px;
      box-shadow: 0px 0px 5px rgba(0, 0, 0, 0.1);
    }

    .chat-header {
      background-color: #1976d2;
      color: #fff;
      padding: 10px;
      border-radius: 5px 5px 0 0;
    }

    .chat-header h2 {
      font-size: 18px;
    }

    .chat-log {
      height: 400px;
      padding: 10px;
      overflow-y: scroll;
    }

    .chat-message {
      margin: 10px 0;
    }

    .bot-message {
      text-align: left;
    }

    .user-message {
      text-align: right;
    }

    .bot-message p,
    .user-message p {
      background-color: #fff;
      border: 1px solid #ddd;
      padding: 10px;
      border-radius: 10px;
      display: inline-block;
      max-width: 70%;
      word-wrap: break-word;
    }

    .chat-form {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px;
      border-top: 1px solid #ddd;
      border-radius: 0 0 5px 5px;
    }

    #chat-input {
      width: 320%;
      padding: 10px;
      border: none;
      border-radius: 5px;
      margin-right: 10px;
    }

    button[type="submit"] {
      padding: 10px 20px;
      border: none;
      border-radius: 5px;
      background-color: #1976d2;
      color: #fff;
      cursor: pointer;
      transition: background-color 0.3s ease;
    }

    button[type="submit"]:hover {
      background-color: #0d47a1;
    }

    .navbar-custom {
      background-color: #1976d2 !important;
      margin-bottom: 20px;
    }

    .navbar-custom .nav-link {
      color: #fff !important;
      font-weight: 500;
      margin: 0 10px;
      transition: color 0.3s ease;
    }

    .navbar-custom .nav-link:hover {
      color: #e3f2fd !important;
    }
  </style>
</head>

<body>

  <!-- Navigation Bar -->
  <nav class="navbar navbar-expand-lg navbar-custom">
    <div class="container">
      <span class="navbar-brand text-white">Healthcare Assistant</span>
      <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ml-auto">
          <li class="nav-item">
            <a class="nav-link" href="/">Home</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="/#predictors">Try Predictors</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="{{ url_for('auth.logout') }}">Logout</a>
          </li>
        </ul>
      </div>
    </div>
  </nav>

  <div class="container">
    <div class="text-center my-3">
      <a href="/" class="btn btn-primary btn-lg">Go Back To Home</a>
    </div>
  </div>

  <div class="chat-container">
    <div class="chat-header">
      <h2>Chatbot</h2>
    </div>
    <div class="chat-log">
      <div class="chat-message bot-message" id="chat-message">

      </div>
    </div>
    <div class="chat-form">
      <form id="chat-form" action="/HealthCareAssistant" method="POST">
        <input type="text" name="message" id="chat-input" placeholder="Type your message here" />
        <button id="addbtn" onclick="input_click()" type="submit">Send</button>
      </form>
    </div>
    <div class="chat-log">
      <div class="chat-message bot-message">
        <p></p>
      </div>
    </div>
  </div>

  <script>
    
    let message_storage;
    let messageobj
    let messages_store
    let reply_bot ="{{ reply|safe }}";
    let message_bot ="{{ message|safe }}";

   

  console.log(reply_bot,message_bot,"++++++++++")
    
    messages_store = localStorage.getItem("messages_store");
    messageobj = (messages_store == null) ? [] : JSON.parse(messages_store);
   
    function showcontent(){
    html=""
    messageobj.forEach((element, index) => {
     
      
      html += `
        <p>${element[0]} ${index}</p>
        <p>${element[1]} ${index}</p>
        `
    })
    document.getElementById("chat-message").innerHTML = html;
  }
    showcontent()
    function input_click(){
  
      let input_text = document.getElementById("chat-input");
      if (input_text.value!=""){

      console.log("999999999999999999")
      messageobj.push([reply_bot, message_bot]);
      messageobj.push([" "," "])

      localStorage.setItem("messages_store", JSON.stringify(messageobj));
      }
      showcontent()
    }
  </script>

  <!-- Footer -->
  <footer class="bg-dark text-white py-4 mt-5">
    <div class="container">
      <div class="row mb-4">
        <div class="col-12 text-center">
          <a href="/" class="btn btn-primary btn-lg">Go Back To Home</a>
        </div>
      </div>
      <div class="row">
        <div class="col-md-6">
          <p>&copy; 2025 Success Disease Predictor. All rights reserved.</p>
        </div>
        <div class="col-md-6 text-end">
          <div class="social-links">
            <a href="https://www.linkedin.com/in/pramoddeore162633/" target="_blank" class="text-white me-3"><i class="fab fa-linkedin"></i></a>
            <a href="https://github.com/pramod13071626/" target="_blank" class="text-white"><i class="fab fa-github"></i></a>
          </div>
        </div>
      </div>
      <div class="row mt-3">
        <div class="col-12 text-center">
          <p class="mb-1">Made by Pramod Deore and Shivprasad Ravate 64 Squares LLC</p>
        </div>
      </div>
    </div>
  </footer>

  <!-- Font Awesome for Social Icons -->
  <script src="https://kit.fontawesome.com/a658a7b479.js" crossorigin="anonymous"></script>

</body>

</html>
